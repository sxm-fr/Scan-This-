<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay!</title>
    <link rel="stylesheet" href="effects.css">
    <style>
        .message-box {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            animation: popup 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }
    </style>
</head>
<body>
    <!-- Giving it the same floral background! -->
    <div class="flower-container">
        <div class="flower">
            <div class="petal" style="--angle: 0deg;"></div>
            <div class="petal" style="--angle: 45deg;"></div>
            <div class="petal" style="--angle: 90deg;"></div>
            <div class="petal" style="--angle: 135deg;"></div>
            <div class="petal" style="--angle: 180deg;"></div>
            <div class="petal" style="--angle: 225deg;"></div>
            <div class="petal" style="--angle: 270deg;"></div>
            <div class="petal" style="--angle: 315deg;"></div>
            <div class="center"></div>
        </div>
    </div>
    
    <div class="message-box">
        <h1>Yay! I knew you'd say Yes! ❤️</h1>
        <p>Go to the next page to see what I have for you   .</p>
    </div>
    <div class="buttons">
        <button id="btn-yes" onclick="window.location.href='page3.html'">Yes</button>
        <button id="btn-no">No</button>
    </div>
</body>
</html>
