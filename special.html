<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="effects.css">
</head>
<body>
    <div class="flower-container">
        <div class="flower">
            <div class="petal" style="--angle: 0deg;"></div>
            <div class="petal" style="--angle: 45deg;"></div>
            <div class="petal" style="--angle: 90deg;"></div>
            <div class="petal" style="--angle: 135deg;"></div>
            <div class="petal" style="--angle: 180deg;"></div>
            <div class="petal" style="--angle: 225deg;"></div>
            <div class="petal" style="--angle: 270deg;"></div>
            <div class="petal" style="--angle: 315deg;"></div>
            <div class="center"></div>
        </div>
    </div>
    <div class="container">
        <div class="box"></div>
        <h1>Hey there! I made something for you.</h1>
        <p>I hope you like it.</p>
        <h5>Do you want to see?</h5>
    </div>  
    <div class="buttons">
        <button id="btn-yes">Yes</button>
        <button id="btn-no">No</button>
    </div>
    <img id="popup-gif" src="https://media.tenor.com/13_g_R0h1Z8AAAAi/bubu-dudu-kiss.gif" alt="Cute GIF" />
    <script src="script.js"></script>
</body> 
</html>
